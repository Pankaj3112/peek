version: 2

project_name: peek

before:
  hooks:
    - go mod tidy

builds:
  - id: peek
    main: ./cmd/peek
    binary: peek
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: peek
    ids:
      - peek
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README*
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^test:'
      - 'merge'

release:
  github:
    owner: Pankaj3112
    name: peek
  draft: false
  prerelease: auto

# Homebrew formula — DISABLED for v0.1.0.
# Formula is still generated locally at dist/homebrew/peek.rb on snapshot/release
# builds, but nothing is pushed anywhere.
#
# To enable Homebrew distribution later:
#   1. Create empty repo github.com/Pankaj3112/homebrew-tap
#   2. Ensure GITHUB_TOKEN env var has repo scope
#   3. Change `skip_upload: true` below to `skip_upload: auto`
#   4. Cut the next release; goreleaser pushes the formula automatically
#
# Then users install with:
#   brew tap Pankaj3112/tap
#   brew install peek
brews:
  - name: peek
    repository:
      owner: Pankaj3112
      name: homebrew-tap
    homepage: https://github.com/Pankaj3112/peek
    description: Capture dev server logs and expose them to Claude via MCP.
    license: MIT
    install: |
      bin.install "peek"
    test: |
      system "#{bin}/peek", "--version"
    skip_upload: true

# Scoop manifest — DISABLED for v0.1.0.
# Manifest is still generated locally at dist/scoop/peek.json on snapshot/release
# builds, but nothing is pushed anywhere.
#
# To enable Scoop distribution later:
#   1. Create empty repo github.com/Pankaj3112/scoop-bucket
#   2. Ensure GITHUB_TOKEN env var has repo scope
#   3. Change `skip_upload: true` below to `skip_upload: auto`
#   4. Cut the next release; goreleaser pushes the manifest automatically
#
# Then Windows users install with:
#   scoop bucket add peek https://github.com/Pankaj3112/scoop-bucket
#   scoop install peek
scoops:
  - name: peek
    repository:
      owner: Pankaj3112
      name: scoop-bucket
    homepage: https://github.com/Pankaj3112/peek
    description: Capture dev server logs and expose them to Claude via MCP.
    license: MIT
    skip_upload: true
