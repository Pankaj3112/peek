version: 2

project_name: peek

before:
  hooks:
    - go mod tidy

builds:
  - id: peek
    main: ./cmd/peek
    binary: peek
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: peek
    ids:
      - peek
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^test:'
      - 'merge'

release:
  github:
    owner: Pankaj3112
    name: peek
  draft: false
  prerelease: auto

# Homebrew formula — pushed to Pankaj3112/homebrew-tap on every tagged release.
# To use after a release:
#   brew tap Pankaj3112/tap
#   brew install peek
#
# Prerequisites (one-time setup before first release):
#   1. Create empty repo github.com/Pankaj3112/homebrew-tap
#   2. Ensure GITHUB_TOKEN env var has repo scope (or use `gh auth login`)
#   3. Tag a release: git tag v0.1.0 && git push origin v0.1.0
#   4. Run: goreleaser release   (or let CI do it)
#
# skip_upload: auto means goreleaser does NOT push during --snapshot builds,
# so you can snapshot locally without the tap repo existing yet.
brews:
  - name: peek
    repository:
      owner: Pankaj3112
      name: homebrew-tap
    homepage: https://github.com/Pankaj3112/peek
    description: Capture dev server logs and expose them to Claude via MCP.
    license: MIT
    install: |
      bin.install "peek"
    test: |
      system "#{bin}/peek", "--version"
    skip_upload: auto

# Scoop manifest — activate by:
#   1. Adding "windows" back to the builds.goos list above (requires porting
#      internal/wrapper away from PTY/SIGWINCH for Windows support).
#   2. Creating github.com/Pankaj3112/scoop-bucket (empty repo).
#   3. Ensuring GITHUB_TOKEN has repo scope.
#   4. Uncommenting the scoops block below.
#
# To install on Windows once active:
#   scoop bucket add peek https://github.com/Pankaj3112/scoop-bucket
#   scoop install peek
#
# GoReleaser requires at least one Windows archive to generate the Scoop manifest.
scoops:
  - name: peek
    repository:
      owner: Pankaj3112
      name: scoop-bucket
    homepage: https://github.com/Pankaj3112/peek
    description: Capture dev server logs and expose them to Claude via MCP.
    license: MIT
    skip_upload: auto
